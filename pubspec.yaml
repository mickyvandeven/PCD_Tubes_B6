name: app_fatscan
description: "FatScan - AI Food Fat Analyzer"
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ">=3.10.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  go_router: ^16.2.1
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1

  # Camera & Gallery
  camera: ^0.11.0+2
  image_picker: ^1.1.2

  # ML Kit
  google_mlkit_image_labeling: ^0.13.0
  google_mlkit_commons: ^0.9.0

  # State Management
  provider: ^6.1.2

  # Local Database
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Chart
  fl_chart: ^0.69.0

  # API
  http: ^1.2.2

  # File path
  path_provider: ^2.1.4

  # UUID for unique IDs
  uuid: ^4.5.1
  flutter_dotenv: ^6.0.1
  image: ^4.8.0
  tflite_flutter: ^0.12.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.13

flutter:
  uses-material-design: true
  assets:
    - .env
    - assets/models/
